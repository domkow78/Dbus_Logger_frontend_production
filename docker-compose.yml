services:
  dbus-logger-frontend:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
        - linux/arm/v7
    container_name: dbus-logger-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./stations.json:/app/stations.json
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "start_frontend.py", "--no-browser"]
